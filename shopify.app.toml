# Morgan — Shopify Partner app (unlisted, mobile-first OAuth)
# https://shopify.dev/docs/apps/tools/cli/configuration

name = "Morgan"
client_id = "YOUR_SHOPIFY_API_KEY"
application_url = "http://localhost:8080"
embedded = false

[access_scopes]
scopes = "read_orders,read_products,read_inventory,read_locations,read_shopify_payments_payouts,read_customers"

[auth]
redirect_urls = [
  "http://localhost:8080/api/v1/auth/shopify/callback"
]

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks/shopify"

  [[webhooks.subscriptions]]
  topics = ["orders/updated"]
  uri = "/webhooks/shopify"

  [[webhooks.subscriptions]]
  topics = ["orders/cancelled"]
  uri = "/webhooks/shopify"

  [[webhooks.subscriptions]]
  topics = ["refunds/create"]
  uri = "/webhooks/shopify"

  [[webhooks.subscriptions]]
  topics = ["products/update"]
  uri = "/webhooks/shopify"

  [[webhooks.subscriptions]]
  topics = ["products/delete"]
  uri = "/webhooks/shopify"

  [[webhooks.subscriptions]]
  topics = ["inventory_levels/update"]
  uri = "/webhooks/shopify"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/shopify/compliance"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "/webhooks/shopify/compliance"

[pos]
embedded = false
