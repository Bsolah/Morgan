name: morgan_mobile
description: Morgan — mobile-first AI CFO for Shopify merchants.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.9

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  share_plus: ^10.1.4
  pdf: ^3.11.3
  google_fonts: ^6.2.1
  flutter_web_auth_2: 3.1.2
  local_auth: 2.2.0
  app_links: ^6.4.0
  plaid_flutter: ^4.2.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

dependency_overrides:
  # Xcode 14.2 / Swift 5.7: 1.6.x uses Swift concurrency patterns that fail to compile.
  local_auth_darwin: 1.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
